<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Instant Pressure Washing Quote</title>
  <meta name="description" content="Get an instant pressure washing price for your home in 60 seconds." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- The map fills the whole screen, like Google Maps. -->
  <div id="map"></div>

  <!-- Floating search bar (Google Places autocomplete attaches here). -->
  <div id="search-bar" class="hidden">
    <span class="search-icon">🔍</span>
    <input id="address-input" type="text" placeholder="Search your address…"
           autocomplete="off" inputmode="text" />
    <button id="search-clear" class="search-clear hidden" aria-label="Clear">✕</button>
  </div>

  <!-- Measuring toolbar (only while tracing on the map). -->
  <div id="measure-top" class="measure-top hidden">
    <p id="measure-instructions">Tap each <b>corner</b> on the map.</p>
    <p id="measure-readout">0 sq ft</p>
  </div>

  <!-- Bottom sheet — the quoting controls ride here, over the map. -->
  <section id="sheet" class="sheet hidden">
    <div class="sheet-handle"></div>
    <div id="sheet-body"></div>
  </section>

  <!-- Measuring controls (bottom, over the map). -->
  <div id="measure-controls" class="measure-controls hidden">
    <div class="measure-row" id="measure-shape-row">
      <button class="m-btn m-ghost" id="btn-add">➕ Add section</button>
      <button class="m-btn m-cut" id="btn-cut">➖ Cut out pool</button>
    </div>
    <div class="measure-row">
      <button class="m-btn m-ghost" id="btn-undo">↩︎ Undo</button>
      <button class="m-btn m-ghost" id="btn-cancel">✕ Cancel</button>
      <button class="m-btn m-primary" id="btn-done" disabled>✓ Done</button>
    </div>
  </div>

  <!-- Full-screen setup notice if the Google key is missing. -->
  <div id="nokey" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-emoji">🔑</div>
      <h2>One quick setup step</h2>
      <p>This quote tool runs on Google Maps. Add your free Google Maps API
         key in <code>config.js</code> and refresh — the README walks you
         through it in about 5 minutes.</p>
    </div>
  </div>

  <!-- Loading veil while Google Maps boots. -->
  <div id="booting" class="overlay">
    <div class="overlay-card">
      <div class="spinner"></div>
      <p id="biz-booting">Loading…</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
